name: "Release"

on:
  push:
    tags:
      - "v*"
    branches-ignore:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9
      - name: Cache
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Install clamdscan
        run: sudo apt-get install clamdscan -y
      - name: Get release version
        run: echo "release_version=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
      - name: Run tests & install
        run: mvn $MAVEN_CLI_OPTS -Dtestng.groups="travis" -Denforcer.skip=true clean org.jacoco:jacoco-maven-plugin:prepare-agent install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RODA_CORE_SOLR_TYPE: CLOUD
          RODA_CORE_SOLR_CLOUD_URLS: localhost:2181
          SIEGFRIED_MODE: standalone
          LDAP_SERVER_URL: ldap://localhost
          LDAP_SERVER_PORT: 1389
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/roda_core_db
      - name: Deploy to GitHub packages
        run: mvn $MAVEN_CLI_OPTS clean deploy -Dmaven.test.skip=true -Pcore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Copy target to docker context
        run: |
          mkdir -p docker/target
          cp -r roda-ui/roda-wui/target/roda-wui-${{ env.release_version }}.jar docker/target
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/keeps/roda
            keeps/roda
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
          flavor: |
            latest=false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to DockerHub container registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: docker
          tags: ${{ steps.meta.outputs.tags }}
          sbom: true
          provenance: mode=max
      - name: Upload artifact to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: roda-ui/roda-wui/target/roda-wui-${{ env.release_version }}.jar
          asset_name: roda-wui-${{ env.release_version }}.jar
          tag: ${{ github.ref }}
          release_name: ${{ github.ref_name }}
          draft: true
          body: |
            #### New features 

            #### Enhancements 

            #### Bug fixes

            #### Security
            - Several dependency major upgrades to fix security vulnerabilities

            ---

            To try out this version, check the [install instructions](https://github.com/keeps/roda/blob/master/deploys/standalone/README.md).
      - name: Trigger KEEPS GitLab CI/CD
        run: |
          curl -X POST \
            --fail \
            -F token=${{ secrets.GITLAB_RODA_DEV_TRIGGER_TOKEN }} \
            -F variables[DOCKER_TAG]=${{ github.ref_name }} \
            -F ref=main \
            ${{ secrets.GITLAB_RODA_DEV_TRIGGER }}
