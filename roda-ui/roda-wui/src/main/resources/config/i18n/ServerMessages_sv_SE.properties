plugin.auditLogTruncatorPlugin.name:Trunkering av revisionslogg
plugin.auditLogTruncatorPlugin.description:Trunkeringen av revisionsloggen tar bort alla poster i revisionsloggen som är äldre än det angivna antalet dagar. \
  Loggen bevaras som externa fysiska filer, men äldre poster visas inte i det grafiska användargränssnittet. \
  För att komma åt äldre loggposter behövs åtkomst till lagringslagret på arkivsystemets server. \
  Trunkering av revisionslogg frigör automatiskt indexutrymme och förbättrar arkivsystemets prestanda som helhet.
