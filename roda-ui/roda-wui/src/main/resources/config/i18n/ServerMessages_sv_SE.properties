plugin.inventoryReportPlugin.name:Skapare av inventeringsrapport
plugin.inventoryReportPlugin.description:Pluginet för inventeringsrapporter automatiserar genereringen av en detaljerad inventeringsrapport i CSV-format för alla AIP:er och deras motsvarande filer (både data och metadata) \
  inom ett arkivsystem. Rapporten inkluderar teknisk information som SIP-ID, AIP-ID, representations-ID, filsökväg och kryptografiska hashvärden som SHA-256, MD5 och SHA-1. \
  Denna information kan användas för att validera arkivsystemets innehåll genom att jämföra med tidigare inventeringsrapporter genererade under förhandslevering. \
  Inventeringsrapportjämföraren är ett valfritt verktyg som kan användas för att jämföra inventeringsrapporter från olika tidsperioder. \
  Detta underlättar identifiering av eventuella förändringar eller avvikelser i arkivsystemets innehåll över tid. För mer information om Inventeringsrapportjämföraren eller för att begära en demonstration, kontakta sales@keep.pt.
