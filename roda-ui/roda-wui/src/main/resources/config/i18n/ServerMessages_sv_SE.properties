plugin.antivirusPlugin.name:Skadlig programvara-detektor
plugin.antivirusPlugin.description:Detta plugin erbjuder robusta säkerhetsfunktioner genom att utnyttja ClamAV antivirusmotorn för att skanna filer efter potentiella hot, \
  inklusive trojaner, virus, skadlig programvara och annat skadligt innehåll. \
  ClamAV är en pålitlig antivirusmotor med öppen källkod (GPL) som är allmänt använd inom branschen för sin exceptionella noggrannhet och effektivitet vid hotdetektering.
plugin.premisSkeletonPlugin.name:Beräkning av filinformation
plugin.premisSkeletonPlugin.description:Beräknar fixitetsinformation (även känd som kontrollsumma) för alla datafiler inom ett AIP, representation eller fil och lagrar denna information i PREMIS-objekt \
  inom motsvarande enhet. Denna uppgift använder SHA-256 som standardalgoritm för kontrollsummor, men andra algoritmer kan konfigureras.
plugin.siegfriedPlugin.name:Filformatdetektor
plugin.siegfriedPlugin.description:Pluginet Filformatdetektor är ett viktigt verktyg för att identifiera och analysera olika filformat. \
  Det ger omfattande information om varje fil, inklusive dess namn, benämning, version, MIME-typ och PRONOM-identifierare. \
  Denna information kan användas för att avgöra vilken programvara som ska öppna och hantera filen, samt för att säkerställa kompatibilitet med olika system och applikationer.
