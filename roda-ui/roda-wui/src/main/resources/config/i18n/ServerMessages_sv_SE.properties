plugin.exportAipPlugin.name:AIP-batchexportör
plugin.exportAipPlugin.description:AIP-batchexportören är ett kraftfullt plugin som låter dig välja en grupp AIP:er och exportera dem som en enda ZIP-fil eller mapp. \
  Resultatet sparas på serverns filsystem, som kan nås av användare med nödvändiga behörigheter. \
  Detta plugin är särskilt användbart när du behöver exportera ett stort antal AIP:er baserat på specifika sökkriterier. \
  Med några få klick kan du skapa en batchexport av AIP:er och ladda ner dem i komprimerat format. \
  Detta sparar tid och ansträngning och säkerställer att dina AIP:er lagras och överförs effektivt.
