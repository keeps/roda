plugin.riskAssociationPlugin.name: Skapare av riskincidenter
plugin.riskAssociationPlugin.description: Pluginet för riskassociering kopplar valda objekt (AIP:er, representationer eller filer) till befintliga risker i riskregistret (som riskincidenter). \
  Denna åtgärd är användbar när bevarandeexperten vill koppla en uppsättning objekt till en risk som ska begränsas inom en snar framtid. \
  Som exempel, om arkivsystemets utsedda community ger feedback att ett visst format i en viss samling inte visas korrekt i det grafiska användargränssnittet, \
  kan bevarandeexperten vilja markera dessa filer för att omfattas av en bevarandeåtgärd (t.ex. generera nya representationer för åtkomständamål).
