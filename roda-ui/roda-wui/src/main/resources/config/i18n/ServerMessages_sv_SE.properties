plugin.aipCorruptionRiskAssessmentPlugin.name: Filintegritetsverifierare
plugin.aipCorruptionRiskAssessmentPlugin.description: Pluginet Filintegritetsverifierare beräknar fixitets-/kontrollsummeinformation för filer i ett Arkivinformationspaket (AIP) \
  och verifierar om denna information avviker från informationen lagrad i bevarandemetadata. I så fall skapas en ny risk och den skadade filen kopplas till den risken i riskregistret. \
  Pluginet skapar också en incident kopplad till representationen om en PREMIS-fil finns men den associerade filen inte gör det. Inom arkivsystemet används fixitetskontroll för att säkerställa att digitala \
  filer inte har påverkats av dataförlust eller andra digitala bevaranderisker. I sig garanterar fixitetskontroll inte bevarandet av en digital fil. Istället möjliggör den för arkivsystemet \
  att identifiera vilka skadade filer som ska ersättas med en ren kopia från producenten eller från en säkerhetskopia.

