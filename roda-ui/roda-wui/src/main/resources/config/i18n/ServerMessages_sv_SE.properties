plugin.fixAncestorsPlugin.name: Åtgärda AIP-förfädershierarki
plugin.fixAncestorsPlugin.description: Försöker åtgärda förfädershierarkin för AIP:erna i katalogen genom att ta bort spöken (dvs. AIP:er med obefintliga förfäder i katalogen) \
  och sammanslå AIP:er med samma inleverans-SIP-identifierare. Denna uppgift syftar till att åtgärda problem som kan uppstå när SIP:er levereras in men inte alla nödvändiga poster för att konstruera \
  katalogens hierarki har tagits emot eller levererats in korrekt.

