plugin.createDisposalConfirmationPlugin.parameter.info.description:Eltávolítási megerősítés információ.
plugin.deleteDisposalConfirmationPlugin.name:Eltávolítási megerősítés törlése
plugin.deleteDisposalConfirmationPlugin.parameter.eventDetails.name:Esemény részletei
