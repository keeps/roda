# Plugins
###########################################
plugin.antivirusPlugin.name:Rosszindulatú szoftver érzékelő
plugin.antivirusPlugin.description:Ez a bővítmény robusztus biztonsági funkciókat biztosít a ClamAV víruskereső motor felhasználásával, amely átvizsgálja a fájlokat a potenciális fenyegetések, \
  köztük trójaiak, vírusok, rosszindulatú szoftverek és egyéb kártékony tartalmak felderítése érdekében. \
  A ClamAV egy megbízható, nyílt forráskódú (GPL) víruskereső motor, amelyet az iparágban széles körben használnak a fenyegetések pontos és hatékony észlelésére.
plugin.premisSkeletonPlugin.name:Fájlinformáció kiszámítása
plugin.premisSkeletonPlugin.description:Kiszámítja a fájl fixitási információkat (más néven ellenőrző összeget) egy AIP, reprezentáció vagy fájl összes adatfájljára, és ezt az információt PREMIS objektumokban tárolja \
  a megfelelő entitáson belül. Ez a feladat alapértelmezettként SHA-256 ellenőrző algoritmust használ, azonban más algoritmusok is konfigurálhatók.
plugin.siegfriedPlugin.name:Fájlformátum érzékelő
plugin.siegfriedPlugin.description:A fájlformátum érzékelő bővítmény nélkülözhetetlen eszköz a különböző fájlformátumok azonosításához és elemzéséhez. \
  Átfogó információkat nyújt minden fájlról, beleértve a nevét, megnevezését, verzióját, MIME típusát és PRONOM azonosítóját. \
  Ez az információ felhasználható a fájl megnyitásához és kezeléséhez megfelelő szoftver meghatározásához, valamint a különböző rendszerekkel és alkalmazásokkal való kompatibilitás biztosításához.
plugin.createDisposalConfirmationPlugin.name:Eltávolítási megerősítés létrehozása
plugin.createDisposalConfirmationPlugin.parameter.title.name:Eltávolítási megerősítés címe
plugin.createDisposalConfirmationPlugin.parameter.title.description:A létrehozandó eltávolítási megerősítő jelentés címe.
