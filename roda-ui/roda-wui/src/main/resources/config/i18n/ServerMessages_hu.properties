plugin.aipCorruptionRiskAssessmentPlugin.name: Fájl integritás ellenőrző
plugin.aipCorruptionRiskAssessmentPlugin.description: A fájl integritás ellenőrző bővítmény kiszámítja az archív információs csomag (AIP) belsejében lévő fájlok fixitási/ellenőrző összeg információit, \
  és ellenőrzi, hogy ez az információ eltér-e a megőrzési metaadatokban tárolt információtól. Ha igen, új kockázatot hoz létre és a sérült fájlt hozzárendeli a kockázathoz a Kockázati nyilvántartásban. \
  A bővítmény előfordulást is létrehoz a reprezentációhoz kapcsolva, ha létezik PREMIS fájl, de a hozzá tartozó fájl nem. A repozitóriumban a fixitás ellenőrzés annak biztosítására szolgál, hogy a digitális \
  fájlokat nem érintette adatromlás vagy egyéb digitális megőrzési veszély. Önmagában a fixitás ellenőrzés nem biztosítja a digitális fájl megőrzését. Ehelyett lehetővé teszi a repozitórium számára, \
  hogy azonosítsa, mely sérült fájlokat kell a gyártótól vagy biztonsági mentésből származó tiszta másolattal pótolni.

