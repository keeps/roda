plugin.riskAssociationPlugin.name: Kockázati előfordulás létrehozó
plugin.riskAssociationPlugin.description: A kockázat társító bővítmény a kiválasztott elemeket (AIP-ek, reprezentációk vagy fájlok) hozzárendeli a Kockázati nyilvántartásban meglévő kockázatokhoz (kockázati előfordulásokként). \
  Ez a művelet kényelmes, ha a megőrzési szakértő elemek egy csoportját szeretné egy a közeljövőben enyhítendő kockázathoz társítani. \
  Példaként, ha a repozitórium kijelölt közössége visszajelzést ad, hogy egy adott formátum egy bizonyos gyűjtemény alatt nem jelenik meg megfelelően a repozitórium grafikus felhasználói felületén, \
  akkor a megőrzési szakértő meg kívánja jelölni ezeket a fájlokat egy megőrzési művelet célpontjaként (pl. új reprezentációk előállítása hozzáférési célokra).
