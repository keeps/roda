plugin.fixAncestorsPlugin.name: AIP ős hierarchia javítása
plugin.fixAncestorsPlugin.description: Megpróbálja javítani a katalógusban lévő AIP-ek ős hierarchiáját a szellemek eltávolításával (azaz olyan AIP-ek, amelyeknek nem létező őseik vannak a katalógusban) \
  és az azonos befogadási SIP azonosítóval rendelkező AIP-ek egyesítésével. Ez a feladat a SIP-ek befogadásakor felmerülő problémák javítását célozza, amikor nem minden szükséges elem érkezett meg \
