plugin.auditLogTruncatorPlugin.name:Auditnapló csonkító
plugin.auditLogTruncatorPlugin.description:Az auditnapló csonkító eltávolítja az auditnaplóból az összes olyan bejegyzést, amely régebbi a megadott napok számánál. \
  A napló külső fizikai fájlokként megőrzésre kerül, azonban a régebbi bejegyzések nem jelennek meg a grafikus felhasználói felületen. \
  A régebbi naplóbejegyzések eléréséhez hozzáférés szükséges a repozitórium szerverének tárolási rétegéhez. \
  Az auditnapló csonkítás automatikusan felszabadítja az index tárhelyet és javítja a repozitórium általános teljesítményét.
