plugin.exportAipPlugin.name:AIP kötegelt exportáló
plugin.exportAipPlugin.description:Az AIP kötegelt exportáló egy hatékony bővítmény, amely lehetővé teszi AIP-ek csoportjának kiválasztását és egyetlen ZIP fájlként vagy mappaként történő exportálását. \
  Az eredmény a szerver fájlrendszerére kerül mentésre, amelyhez a megfelelő jogosultsággal rendelkező felhasználók férhetnek hozzá. \
  Ez a bővítmény különösen hasznos, ha nagyszámú AIP-t kell exportálni meghatározott keresési feltételek alapján. \
  Néhány kattintással kötegelt AIP exportot hozhat létre és tömörített formátumban töltheti le azokat. \
  Ez időt és erőfeszítést takarít meg, és biztosítja az AIP-ek hatékony tárolását és átvitelét.
