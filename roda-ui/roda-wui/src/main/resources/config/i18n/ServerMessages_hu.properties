plugin.inventoryReportPlugin.name:Leltárjelentés készítő
plugin.inventoryReportPlugin.description:A leltárjelentés készítő bővítmény automatizálja a részletes leltárjelentés CSV formátumban történő előállítását a repozitórium összes AIP-jéhez és a hozzájuk tartozó fájlokhoz (adatok és metaadatok egyaránt). \
  A jelentés technikai információkat tartalmaz, mint például SIP azonosító, AIP azonosító, reprezentáció azonosító, fájl elérési út és kriptográfiai hash értékek, mint SHA-256, MD5 és SHA-1. \
  Ez az információ felhasználható a repozitórium tartalmának teljességének és helyességének ellenőrzésére a befogadás előtt készített korábbi leltárjelentésekkel való összehasonlítással. \
  A Leltárjelentés Összehasonlító Alkalmazás egy opcionális eszköz, amellyel különböző időszakok leltárjelentései hasonlíthatók össze. \
  Ez lehetővé teszi a repozitórium tartalmában bekövetkezett változások vagy eltérések egyszerű azonosítását. A Leltárjelentés Összehasonlító Alkalmazásról további információért vagy demóért keresse a sales@keep.pt címet.
