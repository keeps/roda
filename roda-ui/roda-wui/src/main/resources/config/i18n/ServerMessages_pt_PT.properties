plugin.riskAssociationPlugin.name: Criador de incidências de risco
plugin.riskAssociationPlugin.description: O plugin associador de riscos associa itens selecionados (AIPs, Representações ou Ficheiros) a riscos existentes no Registo de riscos (como incidências de risco). \
  Esta ação é conveniente quando o especialista em preservação pretende associar um conjunto de itens a um risco a ser mitigado num futuro próximo. \
  Como exemplo, se a comunidade designada do repositório fornecer feedback de que um determinado formato numa certa coleção não está a ser apresentado corretamente na interface gráfica do repositório, \
  então o especialista em preservação pode querer marcar estes ficheiros para serem alvo de uma ação de preservação (por exemplo, gerar novas representações para fins de acesso).
