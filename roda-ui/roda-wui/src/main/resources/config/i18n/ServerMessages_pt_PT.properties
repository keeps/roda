plugin.auditLogTruncatorPlugin.name:Truncador de registos de auditoria
plugin.auditLogTruncatorPlugin.description:O Truncador de registos de auditoria remove todas as entradas no registo de auditoria com mais dias do que o número especificado. \
  O registo é preservado como ficheiros físicos externos, contudo as entradas mais antigas não serão apresentadas na interface gráfica. \
  Para aceder a entradas mais antigas, é necessário acesso à camada de armazenamento do servidor do repositório. \
  A truncagem do registo de auditoria liberta automaticamente espaço de índice e melhora o desempenho do repositório.
