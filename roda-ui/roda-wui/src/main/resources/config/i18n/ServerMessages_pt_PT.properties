plugin.inventoryReportPlugin.name:Criador de relatório de inventário
plugin.inventoryReportPlugin.description:O plugin Criador de relatório de inventário automatiza a geração de um relatório de inventário detalhado em formato CSV para todos os AIPs e os respetivos ficheiros (dados e metainformação) \
  dentro de um repositório. O relatório inclui informação técnica como ID do SIP, ID do AIP, ID da representação, caminho do ficheiro e valores de hash criptográficos como SHA-256, MD5 e SHA-1. \
  Esta informação pode ser utilizada para validar a completude e correção do conteúdo do repositório comparando-a com relatórios de inventário anteriores gerados durante a pré-ingestão. \
  A aplicação Comparador de Relatórios de Inventário é uma ferramenta opcional que pode ser utilizada para comparar relatórios de inventário de diferentes períodos. \
  Isto permite identificar facilmente quaisquer alterações ou discrepâncias no conteúdo do repositório ao longo do tempo. Para saber mais sobre a aplicação Comparador de Relatórios de Inventário ou para solicitar uma demonstração, contacte sales@keep.pt.
