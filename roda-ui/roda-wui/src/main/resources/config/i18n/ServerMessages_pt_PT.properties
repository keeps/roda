plugin.fixAncestorsPlugin.name: Correção da hierarquia de ancestrais de AIPs
plugin.fixAncestorsPlugin.description: Tenta corrigir a hierarquia de ancestrais dos AIPs no catálogo, removendo fantasmas (i.e. AIPs com ancestrais inexistentes no catálogo) \
  e fundindo AIPs com o mesmo identificador de SIP de ingestão. Esta tarefa visa corrigir problemas que podem ocorrer quando SIPs são ingeridos mas nem todos os itens necessários para construir a \
  hierarquia do catálogo foram recebidos ou ingeridos corretamente.

