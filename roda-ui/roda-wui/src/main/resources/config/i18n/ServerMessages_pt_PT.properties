plugin.aipCorruptionRiskAssessmentPlugin.name: Verificador de integridade de ficheiros
plugin.aipCorruptionRiskAssessmentPlugin.description: O plugin Verificador de integridade de ficheiros calcula a informação de fixidade/checksum dos ficheiros dentro de um Pacote de Informação de Arquivo (AIP) \
  e verifica se esta informação difere da informação armazenada na metainformação de preservação. Se sim, cria um novo risco e associa o ficheiro corrompido a esse risco no Registo de riscos. \
  O plugin também cria uma incidência associada à representação se um ficheiro PREMIS existir, mas o ficheiro associado não. Dentro do repositório, a verificação de fixidade é utilizada para garantir que os ficheiros \
  digitais não foram afetados por degradação de dados ou outros perigos de preservação digital. Por si só, a verificação de fixidade não garante a preservação de um ficheiro digital. Em vez disso, permite ao repositório \
  identificar quais ficheiros corrompidos devem ser substituídos por uma cópia limpa do produtor ou de uma cópia de segurança.

