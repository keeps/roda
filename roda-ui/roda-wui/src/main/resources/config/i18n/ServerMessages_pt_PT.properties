##########################################
plugin.antivirusPlugin.name:Detetor de malware
plugin.antivirusPlugin.description:Este plugin oferece funcionalidades de segurança robustas, utilizando o motor antivírus ClamAV \
  para analisar ficheiros em busca de potenciais ameaças, incluindo trojans, vírus, malware e outros conteúdos maliciosos. \
  O ClamAV é um motor antivírus de código aberto (GPL) amplamente utilizado na indústria pela sua precisão e eficácia na deteção de ameaças.
plugin.premisSkeletonPlugin.name:Cálculo de informação de ficheiros
plugin.premisSkeletonPlugin.description:Calcula a informação de fixidade (também conhecida como checksum) para todos os ficheiros de dados dentro de um AIP, representação ou ficheiro e armazena esta informação em objetos PREMIS \
  dentro da entidade correspondente. Esta tarefa utiliza SHA-256 como algoritmo de checksum predefinido, contudo, outros algoritmos podem ser configurados.
plugin.siegfriedPlugin.name:Detetor de formato de ficheiros
plugin.siegfriedPlugin.description:O plugin Detetor de formato de ficheiros é uma ferramenta essencial para identificar e analisar vários formatos de ficheiros. \
  Fornece informação abrangente sobre cada ficheiro, incluindo o seu nome, designação, versão, tipo MIME e identificador PRONOM. \
  Esta informação pode ser utilizada para determinar o software adequado para abrir e manipular o ficheiro, bem como para assegurar a compatibilidade com diferentes sistemas e aplicações.
