plugin.exportAipPlugin.name:Exportador de AIPs em lote
plugin.exportAipPlugin.description:O Exportador de AIPs em lote é um plugin poderoso que permite selecionar um grupo de AIPs e exportá-los como um único ficheiro ZIP ou pasta. \
  O resultado é guardado no sistema de ficheiros do servidor, podendo ser acedido por utilizadores com as permissões necessárias. \
  Este plugin é particularmente útil quando necessita de exportar um grande número de AIPs com base em critérios de pesquisa específicos. \
  Com apenas alguns cliques, pode criar uma exportação em lote de AIPs e transferi-los num formato comprimido. \
  Isto poupa tempo e esforço e garante que os seus AIPs são armazenados e transferidos de forma eficiente.
