plugin.aipCorruptionRiskAssessmentPlugin.name: Provjera integriteta datoteka
plugin.aipCorruptionRiskAssessmentPlugin.description: Dodatak za provjeru integriteta datoteka izračunava informacije o integritetu/kontrolnom zbroju datoteka unutar arhivskog informacijskog paketa (AIP) \
  i provjerava razlikuju li se te informacije od informacija pohranjenih u metapodacima za očuvanje. Ako da, kreira novi rizik i pridružuje oštećenu datoteku tom riziku u registru rizika. \
  Dodatak također kreira incident vezan uz prikaz ako PREMIS datoteka postoji, ali pridružena datoteka ne postoji. Unutar spremišta, provjera integriteta koristi se kako bi se osiguralo da digitalne \
  datoteke nisu pogođene propadanjem podataka ili drugim opasnostima digitalnog očuvanja. Sama po sebi, provjera integriteta ne osigurava očuvanje digitalne datoteke. Umjesto toga, omogućuje spremištu \
  da identificira koje oštećene datoteke treba zamijeniti čistom kopijom od proizvođača ili iz sigurnosne kopije.

