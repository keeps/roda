plugin.inventoryReportPlugin.name:Kreator inventarnog izvješća
plugin.inventoryReportPlugin.description:Dodatak za kreiranje inventarnog izvješća automatizira generiranje detaljnog inventarnog izvješća u CSV formatu za sve AIP-ove i njihove odgovarajuće datoteke (podatkovne i metapodatkovne) \
  unutar spremišta. Izvješće uključuje tehničke informacije kao što su SIP ID, AIP ID, ID prikaza, putanja datoteke i kriptografske hash vrijednosti poput SHA-256, MD5 i SHA-1. \
  Te se informacije mogu koristiti za validaciju potpunosti i ispravnosti sadržaja spremišta usporedbom s prethodnim inventarnim izvješćima generiranim tijekom pred-zaprimanja. \
  Aplikacija za usporedbu inventarnih izvješća opcionalni je alat koji se može koristiti za usporedbu inventarnih izvješća iz različitih vremenskih razdoblja. \
  To omogućuje jednostavnu identifikaciju svih promjena ili neslaganja u sadržaju spremišta tijekom vremena. Za više informacija o aplikaciji za usporedbu inventarnih izvješća ili za demo, obratite se na sales@keep.pt.
