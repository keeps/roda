plugin.exportAipPlugin.name:Skupni izvoz AIP-ova
plugin.exportAipPlugin.description:Dodatak za skupni izvoz AIP-ova moćan je alat koji vam omogućuje odabir grupe AIP-ova i izvoz u jednu ZIP datoteku ili mapu. \
  Rezultat se sprema na datotečni sustav poslužitelja, kojem mogu pristupiti korisnici s potrebnim dozvolama. \
  Ovaj je dodatak posebno koristan kada trebate izvesti velik broj AIP-ova na temelju specifičnih kriterija pretraživanja. \
  S nekoliko klikova možete kreirati skupni izvoz AIP-ova i preuzeti ih u komprimiranom formatu. \
  To štedi vrijeme i trud te osigurava učinkovitu pohranu i prijenos vaših AIP-ova.
