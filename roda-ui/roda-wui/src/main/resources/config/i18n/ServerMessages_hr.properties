plugin.antivirusPlugin.name:Detektor zlonamjernog softvera
plugin.antivirusPlugin.description:Ovaj dodatak pruža robusne sigurnosne značajke korištenjem ClamAV antivirusnog motora za skeniranje datoteka na potencijalne prijetnje, \
  uključujući trojance, viruse, zlonamjerni softver i drugi zlonamjerni sadržaj. \
  ClamAV je pouzdani antivirusni motor otvorenog koda (GPL) koji se široko koristi u industriji zbog svoje iznimne točnosti i učinkovitosti u otkrivanju prijetnji.
plugin.premisSkeletonPlugin.name:Izračun informacija o datotekama
plugin.premisSkeletonPlugin.description:Izračunava informacije o integritetu datoteka (poznate i kao kontrolni zbroj) za sve podatkovne datoteke unutar AIP-a, prikaza ili datoteke \
  te pohranjuje te informacije u PREMIS objekte unutar odgovarajućeg entiteta. Ovaj zadatak koristi SHA-256 kao zadani algoritam kontrolnog zbroja, no mogu se konfigurirati i drugi algoritmi.
plugin.siegfriedPlugin.name:Detektor formata datoteka
plugin.siegfriedPlugin.description:Dodatak za otkrivanje formata datoteka je ključan alat za identificiranje i analizu raznih formata datoteka. \
  Pruža sveobuhvatne informacije o svakoj datoteci, uključujući naziv, oznaku, verziju, MIME vrstu i PRONOM identifikator. \
  Te se informacije mogu koristiti za utvrđivanje odgovarajućeg softvera za otvaranje i manipuliranje datotekom, kao i za osiguravanje kompatibilnosti s raznim sustavima i aplikacijama.
