plugin.riskAssociationPlugin.name: Kreator incidenata rizika
plugin.riskAssociationPlugin.description: Dodatak za pridruživanje rizika pridružuje odabrane stavke (AIP-ove, prikaze ili datoteke) postojećim rizicima u registru rizika (kao incidente rizika). \
  Ova je radnja prikladna kada stručnjak za očuvanje želi pridružiti skup stavki riziku koji treba ublažiti u bliskoj budućnosti. \
  Na primjer, ako zajednica korisnika spremišta pruži povratnu informaciju da se određeni format pod određenom zbirkom ne prikazuje ispravno u grafičkom korisničkom sučelju spremišta, \
  tada stručnjak za očuvanje može označiti te datoteke za ciljanje radnjom očuvanja (npr. generiranje novih prikaza za pristup).
