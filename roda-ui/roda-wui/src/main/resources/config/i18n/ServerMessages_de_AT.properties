plugin.auditLogTruncatorPlugin.name:Prüfprotokoll-Kürzung
plugin.auditLogTruncatorPlugin.description:Die Prüfprotokoll-Kürzung entfernt alle Einträge im Prüfprotokoll, die älter als die angegebene Anzahl von Tagen sind. \
  Das Protokoll wird als externe physische Dateien aufbewahrt, ältere Einträge werden jedoch nicht in der grafischen Benutzeroberfläche angezeigt. \
  Um auf ältere Protokolleinträge zuzugreifen, benötigt man Zugang zur Speicherebene des Repository-Servers. \
  Die Kürzung des Prüfprotokolls gibt automatisch Indexplatz frei und verbessert die Leistung des gesamten Repositorys.
