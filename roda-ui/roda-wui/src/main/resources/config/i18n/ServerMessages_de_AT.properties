plugin.antivirusPlugin.name:Malware-Detektor
plugin.antivirusPlugin.description:Dieses Plugin bietet robuste Sicherheitsfunktionen durch die Nutzung der ClamAV-Antivirus-Engine zum Scannen von Dateien auf potenzielle Bedrohungen, \
  einschließlich Trojaner, Viren, Malware und andere schädliche Inhalte. \
  ClamAV ist eine vertrauenswürdige Open-Source-Antivirus-Engine (GPL), die in der Branche für ihre außerordentliche Genauigkeit und Wirksamkeit bei der Erkennung von Bedrohungen weit verbreitet ist.
plugin.premisSkeletonPlugin.name:Berechnung von Dateiinformationen
plugin.premisSkeletonPlugin.description:Berechnet die Fixitätsinformation (auch als Prüfsumme bekannt) für alle Datendateien innerhalb eines AIP, einer Repräsentation oder Datei und speichert diese Information in PREMIS-Objekten \
  innerhalb der entsprechenden Entität. Diese Aufgabe verwendet SHA-256 als Standard-Prüfsummenalgorithmus, es können jedoch auch andere Algorithmen konfiguriert werden.
plugin.siegfriedPlugin.name:Dateiformaterkennung
plugin.siegfriedPlugin.description:Das Plugin zur Dateiformaterkennung ist ein wesentliches Werkzeug zur Identifizierung und Analyse verschiedener Dateiformate. \
  Es liefert umfassende Informationen über jede Datei, einschließlich Name, Bezeichnung, Version, MIME-Typ und PRONOM-Kennung. \
  Diese Informationen können verwendet werden, um die geeignete Software zum Öffnen und Bearbeiten der Datei zu bestimmen sowie die Kompatibilität mit verschiedenen Systemen und Anwendungen sicherzustellen.
