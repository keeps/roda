plugin.aipCorruptionRiskAssessmentPlugin.name: Dateiintegrität-Überprüfer
plugin.aipCorruptionRiskAssessmentPlugin.description: Das Plugin zur Dateiintegrität-Überprüfung berechnet die Fixitäts-/Prüfsummeninformation von Dateien innerhalb eines Archival Information Package (AIP) \
  und prüft, ob diese Informationen von den in den Erhaltungsmetadaten gespeicherten Informationen abweichen. Falls ja, wird ein neues Risiko erstellt und die beschädigte Datei diesem Risiko im Risikoregister zugeordnet. \
  Das Plugin erstellt auch einen Vorfall, der mit der Repräsentation verknüpft ist, wenn eine PREMIS-Datei existiert, die zugehörige Datei jedoch nicht. Im Repository wird die Fixitätsprüfung verwendet, um sicherzustellen, dass digitale \
  Dateien nicht durch Datendegradation oder andere Gefahren der digitalen Erhaltung beeinträchtigt wurden. Die Fixitätsprüfung allein stellt nicht die Erhaltung einer digitalen Datei sicher. Stattdessen ermöglicht sie dem Repository, \
  beschädigte Dateien zu identifizieren, die durch eine saubere Kopie vom Produzenten oder aus einem Backup ersetzt werden müssen.

