plugin.inventoryReportPlugin.name:Inventarbericht-Ersteller
plugin.inventoryReportPlugin.description:Das Plugin Inventarbericht-Ersteller automatisiert die Generierung eines detaillierten Inventarberichts im CSV-Format für alle AIPs und ihre zugehörigen Dateien (Daten und Metadaten) \
  innerhalb eines Repositorys. Der Bericht enthält technische Informationen wie SIP-ID, AIP-ID, Repräsentations-ID, Dateipfad und kryptografische Hash-Werte wie SHA-256, MD5 und SHA-1. \
  Diese Informationen können verwendet werden, um die Vollständigkeit und Korrektheit des Repository-Inhalts zu validieren, indem sie mit früheren Inventarberichten verglichen werden, die während der Vor-Ingestierung erstellt wurden. \
  Die Inventarbericht-Vergleichsanwendung ist ein optionales Werkzeug, das zum Vergleichen von Inventarberichten aus verschiedenen Zeiträumen verwendet werden kann. \
  Dies ermöglicht die einfache Identifizierung von Änderungen oder Abweichungen im Repository-Inhalt im Laufe der Zeit. Um mehr über die Inventarbericht-Vergleichsanwendung zu erfahren oder eine Demo anzufordern, kontaktieren Sie bitte sales@keep.pt.
