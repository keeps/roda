plugin.riskAssociationPlugin.name: Risiko-Vorfall-Ersteller
plugin.riskAssociationPlugin.description: Das Risikozuordnungs-Plugin ordnet ausgewählte Elemente (AIPs, Repräsentationen oder Dateien) bestehenden Risiken im Risikoregister zu (als Risiko-Vorfälle). \
  Diese Aktion ist nützlich, wenn der Erhaltungsexperte eine Gruppe von Elementen einem Risiko zuordnen möchte, das in naher Zukunft gemildert werden soll. \
  Wenn beispielsweise die Zielgemeinschaft des Repositorys Rückmeldung gibt, dass ein bestimmtes Format in einer bestimmten Sammlung in der grafischen Benutzeroberfläche des Repositorys nicht korrekt angezeigt wird, \
  kann der Erhaltungsexperte diese Dateien markieren, um sie durch eine Erhaltungsaktion zu behandeln (z.B. neue Repräsentationen für Zugangszwecke erzeugen).
