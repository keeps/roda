plugin.fixAncestorsPlugin.name: Korrektur der AIP-Vorfahrenhierarchie
plugin.fixAncestorsPlugin.description: Versucht, die Vorfahrenhierarchie der AIPs im Katalog zu korrigieren, indem Geister entfernt werden (d.h. AIPs mit nicht existierenden Vorfahren im Katalog) \
  und AIPs mit derselben Ingest-SIP-Kennung zusammengeführt werden. Diese Aufgabe zielt darauf ab, Probleme zu beheben, die auftreten können, wenn SIPs ingestioniert werden, aber nicht alle notwendigen Elemente zur Erstellung der \
  Kataloghierarchie empfangen oder ordnungsgemäß ingestioniert wurden.

