plugin.exportAipPlugin.name:AIP-Stapelexport
plugin.exportAipPlugin.description:Der AIP-Stapelexport ist ein leistungsstarkes Plugin, mit dem Sie eine Gruppe von AIPs auswählen und als einzelne ZIP-Datei oder als Ordner exportieren können. \
  Das Ergebnis wird auf dem Server-Dateisystem gespeichert und kann von Benutzern mit den entsprechenden Berechtigungen abgerufen werden. \
  Dieses Plugin ist besonders nützlich, wenn Sie eine große Anzahl von AIPs basierend auf bestimmten Suchkriterien exportieren möchten. \
  Mit nur wenigen Klicks können Sie einen Stapelexport von AIPs erstellen und in einem komprimierten Format herunterladen. \
  Das spart Zeit und Aufwand und stellt sicher, dass Ihre AIPs effizient gespeichert und übertragen werden.
