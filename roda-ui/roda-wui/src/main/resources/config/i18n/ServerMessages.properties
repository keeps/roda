plugin.auditLogTruncatorPlugin.name:Audit log truncator
plugin.auditLogTruncatorPlugin.description:The audit log truncator removes all entries in the audit log that are older than the specified number of days. \
  The log is preserved as external physical files, however older entries will not be displayed in the graphical user interface. \
  To access older log entries, one needs access to the storage layer of the repository server. \
  Audit log truncation automatically frees index space and improves performance of the repository as a whole.
