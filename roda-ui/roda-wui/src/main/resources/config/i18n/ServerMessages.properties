plugin.inventoryReportPlugin.name:Inventory report creator
plugin.inventoryReportPlugin.description:The inventory report creator plugin automates the generation of a detailed inventory report in CSV format for all AIPs and their corresponding files (both data and metadata) \
  within a repository. The report includes technical information such as SIP ID, AIP ID, representation ID, file path, and cryptographic hash values such as SHA-256, MD5, and SHA-1. \
  This information can be used to validate the completeness and correctness of the repository content by comparing it to previous inventory reports generated during pre-ingest. \
  The Inventory Report Comparator App is an optional tool that can be used to compare inventory reports from different time periods. \
  This allows for easy identification of any changes or discrepancies in the repository's content over time. To learn more about the Inventory Report Comparator App or to request a demo, please contact sales@keep.pt.
