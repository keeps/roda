plugin.antivirusPlugin.name:Malware detector
plugin.antivirusPlugin.description:This plugin provides robust security features by leveraging the ClamAV antivirus engine to scan files for potential threats, including trojans, viruses, malware, and other malicious content. \
  ClamAV is a trusted, open-source (GPL) antivirus engine that is widely used in the industry for its exceptional accuracy and effectiveness in detecting threats.
plugin.premisSkeletonPlugin.name:File information computation
plugin.premisSkeletonPlugin.description:Computes file fixity information (also known as checksum) for all data files within an AIP, representation or file and stores this information in PREMIS objects \
  within the corresponding entity. This task uses SHA-256 as the default checksum algorithm, however, other algorithms can be configured.
plugin.siegfriedPlugin.name:File format detector
plugin.siegfriedPlugin.description:The File format detector plugin is an essential tool for identifying and analyzing various file formats. \
  It provides comprehensive information about each file, including its name, designation, version, MIME type, and PRONOM identifier. \
  This information can be used to determine the appropriate software to open and manipulate the file, as well as to ensure compatibility with different systems and applications.
