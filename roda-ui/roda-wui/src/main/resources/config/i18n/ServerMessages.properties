plugin.fixAncestorsPlugin.name: AIP ancestor hierarchy fix
plugin.fixAncestorsPlugin.description: Attempts to fix the ancestor hierarchy of the AIPs in the catalogue by removing ghosts (i.e. AIPs with nonexistent ancestors in the catalogue) \
  and merging AIPs with the same Ingest SIP identifier. This task aims to fix problems that may occur when SIPs are ingested but not all the necessary items to construct the \
  catalogue hierarchy have been received or properly ingested.

plugin.fixAncestorsPlugin.parameter.ingestJobId.name: Ingest job identifier
plugin.fixAncestorsPlugin.parameter.ingestJobId.description: The identifier of the job responsible to ingest the information package to fix.

plugin.moveOrphansToParentNodePlugin.name: Move orphan(s) to a parent node
plugin.moveOrphansToParentNodePlugin.description: Moves selected AIP(s) that are also orphans, i.e. AIPs whose direct ancestor in the catalogue hierarchy does not exist \
  (except root level nodes) to a new parent node defined by the user. This task aims to fix problems that may occur when SIPs are ingested but not all the necessary \
