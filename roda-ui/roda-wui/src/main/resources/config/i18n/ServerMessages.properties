plugin.riskAssociationPlugin.name: Risk incidence creator
plugin.riskAssociationPlugin.description: The risk associator plugin associates selected items (AIPs, Representations or Files) to existing risks in the Risk registry (as risk incidences). \
  This action is convenient when the preservation expert wants to associate a set of items to a risk to be mitigated in the near future. \
  As an example, if the designated community of the repository provides feedback that a given format under a certain collection is not being displayed properly on the graphical user interface of the repository, \
  then the preservation expert may want to mark these files to be targeted by a preservation action (e.g. generate new representations for access purposes).
