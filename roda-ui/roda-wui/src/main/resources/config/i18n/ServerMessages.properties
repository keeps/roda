plugin.exportAipPlugin.name:AIP batch exporter
plugin.exportAipPlugin.description:The AIP batch exporter is a powerful plugin that allows you to select a group of AIPs and export them as a single ZIP file or folder. \
  The outcome is saved on the server file system, which can be accessed by users with the necessary permissions. \
  This plugin is particularly useful when you need to export a large number of AIPs based on specific search criteria. \
  With just a few clicks, you can create a batch export of AIPs and download them in a compressed format. \
  This saves time and effort and ensures that your AIPs are stored and transferred efficiently.
