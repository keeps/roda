plugin.fixAncestorsPlugin.name: Corrección de jerarquía de ancestros de AIP
plugin.fixAncestorsPlugin.description: Intenta corregir la jerarquía de ancestros de los AIPs en el catálogo eliminando fantasmas (es decir, AIPs con ancestros inexistentes en el catálogo) \
  y fusionando AIPs con el mismo identificador SIP de ingesta. Esta tarea tiene como objetivo corregir problemas que pueden ocurrir cuando se ingestan SIPs pero no se han recibido o ingestado correctamente \
  todos los elementos necesarios para construir la jerarquía del catálogo.

