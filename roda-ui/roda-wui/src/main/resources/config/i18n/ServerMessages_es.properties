plugin.riskAssociationPlugin.name: Creador de incidencias de riesgo
plugin.riskAssociationPlugin.description: El complemento de asociación de riesgos asocia los elementos seleccionados (AIPs, representaciones o archivos) a riesgos existentes en el Registro de riesgos (como incidencias de riesgo). \
  Esta acción es conveniente cuando el experto en preservación desea asociar un conjunto de elementos a un riesgo para ser mitigado en un futuro cercano. \
  Por ejemplo, si la comunidad designada del repositorio proporciona comentarios de que un formato dado bajo una determinada colección no se muestra correctamente en la interfaz gráfica del repositorio, \
  entonces el experto en preservación puede querer marcar estos archivos para ser objetivo de una acción de preservación (p. ej., generar nuevas representaciones para fines de acceso).
