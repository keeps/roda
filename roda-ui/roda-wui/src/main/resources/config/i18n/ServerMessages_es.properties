plugin.reindexAllRodaEntitiesPlugin.name:Reconstruir todos los índices
plugin.reindexAllRodaEntitiesPlugin.description:Elimina todos los índices y los recrea a partir de los datos físicos reales existentes en el almacenamiento, excepto para los procesos. \
  Esta tarea tiene como objetivo corregir inconsistencias entre lo que se muestra en la interfaz gráfica del repositorio y lo que realmente se mantiene en la capa de almacenamiento. Tales inconsistencias pueden ocurrir por \
