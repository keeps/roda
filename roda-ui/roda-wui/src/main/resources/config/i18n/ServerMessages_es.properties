plugin.auditLogTruncatorPlugin.name:Truncador del registro de auditoría
plugin.auditLogTruncatorPlugin.description:El truncador del registro de auditoría elimina todas las entradas en el registro de auditoría que tengan más antigüedad que el número de días especificado. \
  El registro se conserva como archivos físicos externos, sin embargo, las entradas más antiguas no se mostrarán en la interfaz gráfica de usuario. \
  Para acceder a entradas más antiguas del registro, se necesita acceso a la capa de almacenamiento del servidor del repositorio. \
  El truncamiento del registro de auditoría libera automáticamente espacio de índice y mejora el rendimiento del repositorio en general.
