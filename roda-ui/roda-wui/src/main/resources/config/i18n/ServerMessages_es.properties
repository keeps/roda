plugin.aipCorruptionRiskAssessmentPlugin.name: Verificador de integridad de archivos
plugin.aipCorruptionRiskAssessmentPlugin.description: El complemento verificador de integridad de archivos calcula la información de integridad/suma de verificación de los archivos dentro de un Paquete de Información Archivística (AIP) \
  y verifica si esta información difiere de la información almacenada en los metadatos de preservación. Si es así, crea un nuevo riesgo y asigna el archivo corrupto a ese riesgo en el Registro de riesgos. \
  El complemento también crea una incidencia vinculada a la representación si existe un archivo PREMIS pero el archivo asociado no existe. Dentro del repositorio, la verificación de integridad se utiliza para asegurar que los archivos \
  digitales no hayan sido afectados por la degradación de datos u otros peligros de preservación digital. Por sí misma, la verificación de integridad no garantiza la preservación de un archivo digital. En su lugar, permite al repositorio \
  identificar qué archivos corruptos deben reemplazarse con una copia limpia del productor o de una copia de seguridad.

