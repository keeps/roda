plugin.inventoryReportPlugin.name:Creador de informe de inventario
plugin.inventoryReportPlugin.description:El complemento creador de informe de inventario automatiza la generación de un informe de inventario detallado en formato CSV para todos los AIPs y sus archivos correspondientes (tanto datos como metadatos) \
  dentro del repositorio. El informe incluye información técnica como ID de SIP, ID de AIP, ID de representación, ruta de archivo y valores hash criptográficos como SHA-256, MD5 y SHA-1. \
  Esta información puede utilizarse para validar la completitud y corrección del contenido del repositorio comparándolo con informes de inventario previos generados durante la pre-ingesta. \
  La aplicación Comparador de Informes de Inventario es una herramienta opcional que puede utilizarse para comparar informes de inventario de diferentes períodos. \
  Esto permite identificar fácilmente cualquier cambio o discrepancia en el contenido del repositorio a lo largo del tiempo. Para más información sobre la aplicación Comparador de Informes de Inventario o para solicitar una demostración, contacte a sales@keep.pt.
