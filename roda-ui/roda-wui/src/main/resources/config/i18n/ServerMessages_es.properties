###########################################
plugin.antivirusPlugin.name:Detector de malware
plugin.antivirusPlugin.description:Este complemento proporciona características de seguridad robustas aprovechando el motor antivirus ClamAV para escanear archivos en busca de amenazas potenciales, \
  incluyendo troyanos, virus, malware y otro contenido malicioso. \
  ClamAV es un motor antivirus de código abierto (GPL) de confianza ampliamente utilizado en la industria por su excepcional precisión y eficacia en la detección de amenazas.
plugin.premisSkeletonPlugin.name:Cálculo de información de archivos
plugin.premisSkeletonPlugin.description:Calcula la información de integridad de archivos (también conocida como suma de verificación) para todos los archivos de datos dentro de un AIP, representación o archivo \
  y almacena esta información en objetos PREMIS dentro de la entidad correspondiente. Esta tarea utiliza SHA-256 como algoritmo de suma de verificación predeterminado, aunque se pueden configurar otros algoritmos.
plugin.siegfriedPlugin.name:Detector de formato de archivos
plugin.siegfriedPlugin.description:El complemento detector de formato de archivos es una herramienta esencial para identificar y analizar diversos formatos de archivo. \
  Proporciona información completa sobre cada archivo, incluyendo su nombre, designación, versión, tipo MIME e identificador PRONOM. \
  Esta información puede utilizarse para determinar el software adecuado para abrir y manipular el archivo, así como para garantizar la compatibilidad con diferentes sistemas y aplicaciones.
