  eliminados permanentemente del almacenamiento. Este proceso marca el AIP como destruido y se registra un evento PREMIS al finalizar la tarea.
plugin.permanentlyDeleteRecordsPlugin.name:Eliminar permanentemente registros de confirmación de disposición
plugin.permanentlyDeleteRecordsPlugin.description:Elimina permanentemente de la papelera de disposición los registros originales destruidos, liberando espacio de almacenamiento del repositorio. Se registra un evento PREMIS al finalizar la tarea.
