plugin.exportAipPlugin.name:Exportador masivo de AIPs
plugin.exportAipPlugin.description:El complemento de exportación masiva de AIPs es una herramienta potente que le permite seleccionar un grupo de AIPs y exportarlos como un único archivo ZIP o carpeta. \
  El resultado se guarda en el sistema de archivos del servidor, al que pueden acceder los usuarios con los permisos necesarios. \
  Este complemento es particularmente útil cuando necesita exportar un gran número de AIPs basándose en criterios de búsqueda específicos. \
  Con solo unos clics, puede crear una exportación masiva de AIPs y descargarlos en formato comprimido. \
  Esto ahorra tiempo y esfuerzo y garantiza que sus AIPs se almacenen y transfieran de manera eficiente.
